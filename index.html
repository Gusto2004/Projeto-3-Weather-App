<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>App do Tempo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Como está o tempo?</h1>

      <form id="form-cidade">
        <input
          type="text"
          id="input-cidade"
          placeholder="Escreve uma cidade..."
          autocomplete="off"
        />
        <button type="submit">Pesquisar</button>
      </form>

      <div id="resultado" class="resultado">
        <!-- o resultado do tempo vai aparecer aqui -->
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
